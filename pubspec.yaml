name: instruction_clarifier_ai
description: "AI that fixes how humans talk to machines - Convert vague instructions into clear, executable ones"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.0
  
  # AI Integration
  google_generative_ai: ^0.4.0
  
  # Animations
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.3.0
  
  # Utilities
  clipboard: ^0.1.3
  share_plus: ^7.2.1
  
  # HTTP
  http: ^1.1.0
  
  # UI
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

